# Board: Seeed Studio XIAO ESP32C3
# Definition: definitions/boards/seeed_xiao_esp32c3/manifest.yaml

esphome:
  name: ge-profile-fridge
  friendly_name: ge-profile-fridge

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: esp-idf

logger:
  level: VERY_VERBOSE

web_server:
  port: 80
  # https://esphome.io/components/web_server.html

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - output.turn_on: led_wifi
  on_disconnect:
    - output.turn_off: led_wifi

captive_portal:

external_components:
  - source: github://Airey001/esphome-gea
    refresh: 0s

# ---------------------------------------------------------------------------
# Status LEDs
# ---------------------------------------------------------------------------
status_led:
  pin: GPIO2

output:
  - platform: gpio
    pin: GPIO3
    id: led_wifi
  - platform: gpio
    pin: GPIO4
    id: led_gea

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: return id(gea_hub).is_bus_connected();
          then:
            - output.turn_on: led_gea
          else:
            - output.turn_off: led_gea

# ---------------------------------------------------------------------------
# UART — GEA2 19200 baud
# ---------------------------------------------------------------------------

uart:
  id: uart_gea
  tx_pin: GPIO9
  rx_pin: GPIO10
  baud_rate: 19200
  debug:
    direction: BOTH
    dummy_receiver: false

# ---------------------------------------------------------------------------
# GEA2 hub
# ---------------------------------------------------------------------------
gea:
  id: gea_hub
  uart_id: uart_gea
  protocol: gea2
  dest_address: 0xF0
  gea2_discovery: true
  erd_lookup: true


# ---------------------------------------------------------------------------
# Numbers (read-write numeric ERDs)
# ---------------------------------------------------------------------------
number:
  - platform: gea
    gea_id: gea_hub
    name: Refrigerator Setpoint
    erd: 0x1005
    byte_offset: 0
    decode: uint8
    min_value: 34
    max_value: 44
    step: 1

  - platform: gea
    gea_id: gea_hub
    name: Freezer Setpoint
    erd: 0x1005
    byte_offset: 1
    decode: int8
    min_value: -6
    max_value: 6
    step: 1

  - platform: gea
    gea_id: gea_hub
    name: Deli Pan Temperature
    erd: 0x1013
    decode: uint8
    min_value: 30
    max_value: 45
    step: 1

  - platform: gea
    gea_id: gea_hub
    name: Nighttime Snack Timeout
    erd: 0x101F
    decode: uint8
    min_value: 0
    max_value: 255
    step: 1

  - platform: gea
    gea_id: gea_hub
    name: Sound Level
    erd: 0x000A
    decode: uint8
    min_value: 0
    max_value: 2
    step: 1

# ---------------------------------------------------------------------------
# Sensors (numeric read-only)
# ---------------------------------------------------------------------------
sensor:

  - platform: gea
    gea_id: gea_hub
    name: Refrigerator Minimum Setpoint
    erd: 0x100B
    byte_offset: 0
    decode: uint8
    unit_of_measurement: "°F"
    icon: mdi:thermometer-low

  - platform: gea
    gea_id: gea_hub
    name: Refrigerator Maximum Setpoint
    erd: 0x100B
    byte_offset: 1
    decode: uint8
    unit_of_measurement: "°F"
    icon: mdi:thermometer-high

  - platform: gea
    gea_id: gea_hub
    name: Freezer Minimum Setpoint
    erd: 0x100B
    byte_offset: 2
    decode: int8
    unit_of_measurement: "°F"
    icon: mdi:snowflake-thermometer

  - platform: gea
    gea_id: gea_hub
    name: Freezer Maximum Setpoint
    erd: 0x100B
    byte_offset: 3
    decode: int8
    unit_of_measurement: "°F"
    icon: mdi:snowflake-thermometer

  - platform: gea
    gea_id: gea_hub
    name: Refrigerator Temperature
    erd: 0x1004
    byte_offset: 0
    decode: uint8
    unit_of_measurement: "°F"

  - platform: gea
    gea_id: gea_hub
    name: Freezer Temperature
    erd: 0x1004
    byte_offset: 1
    decode: int8
    unit_of_measurement: "°F"

  - platform: gea
    gea_id: gea_hub
    name: Water Filter Life
    erd: 0x1009
    byte_offset: 2
    decode: uint8
    unit_of_measurement: "%"
    icon: mdi:water-percent


  - platform: gea
    gea_id: gea_hub
    name: Water Filter Days Remaining
    erd: 0x1009
    byte_offset: 4
    decode: uint8
    icon: mdi:calendar

# ---------------------------------------------------------------------------
# Text sensors (enum labels / ASCII)
# ---------------------------------------------------------------------------
text_sensor:

  - platform: gea
    name: Refrigerator Model
    erd: 0x0001
    decode: gea_ascii

  - platform: gea
    name: Refrigerator Serial Number
    erd: 0x0002
    decode: gea_ascii

  - platform: gea
    name: Refrigerator Model ERD
    erd: 0x101D
    decode: gea_ascii

  - platform: gea
    name: Appliance Type
    erd: 0x0008
    decode: uint8

  - platform: gea
    name: Temperature Units
    erd: 0x0007
    decode: uint8
    options:
      0: Fahrenheit
      1: Celsius

  - platform: gea
    gea_id: gea_hub
    name: Water Filter Type
    erd: 0x1019
    decode: uint8
    options:
      5: XWFE

  - platform: gea
    name: Odor Filter Status
    erd: 0x101C
    decode: uint8
    options:
      255: Not Installed

# ---------------------------------------------------------------------------
# Switches (read-write binary option ERDs)
# ---------------------------------------------------------------------------
switch:
  - platform: gea
    gea_id: gea_hub
    name: Sabbath Mode
    erd: 0x0009
    