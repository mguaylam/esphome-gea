    gea_id: gea_hub
    name: Sabbath Mode
    erd: 0x0009
    decode: uint8
    options:
      0: Disable
      1: Enable

  - platform: gea
    gea_id: gea_hub
    name: Sound Level
    erd: 0x000A
    decode: uint8
    options:
      0: Off/Mute
      1: Low
      2: Medium
      3: High

  - platform: gea
    gea_id: gea_hub
    name: Enhanced Sabbath Mode
    erd: 0x004F
    decode: uint8
    options:
      0: Inactive
      1: Active

  - platform: gea
    gea_id: gea_hub
    name: Nighttime Snack Mode
    erd: 0x101E
    decode: uint8
    options:
      0: "Off"
      1: "On"

