  - platform: gea
    gea_id: gea_hub
    name: Door Ice Maker Harvests
    erd: 0x1102
    byte_offset: 8
    decode: uint16_be
    accuracy_decimals: 0
    state_class: total_increasing
    entity_category: diagnostic
    icon: mdi:snowflake

  - platform: gea
    gea_id: gea_hub
    name: Freezer Ice Maker Harvests
