# ESPHome config for a GE Profile French Door Refrigerator via GEA2
# Appliance: GE Profile GYE21JYMCFFS
# Hardware: Seeed XIAO ESP32-C3
# Framework: ESP-IDF
# Baud rate: 19200 (GEA2)
# TX = GPIO9, RX = GPIO10
esphome:
  name: ge-profile-fridge
  friendly_name: GE Profile Refrigerator
  project:
    name: GE.GYE21JYMCFFS
    version: "1.0.0"
esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: esp-idf

logger:
  level: DEBUG

web_server:
  port: 80
  # https://esphome.io/components/web_server.html

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ge-profile-fridge fallback"
    password: !secret ap_password
  on_connect:
    - output.turn_on: led_wifi
  on_disconnect:
    - output.turn_off: led_wifi

captive_portal:

external_components:
  - source:
      type: local
      path: ../../components
    components: [gea]

# ---------------------------------------------------------------------------
# Status LEDs
# ---------------------------------------------------------------------------
status_led:
  pin: GPIO2

output:
  - platform: gpio
    pin: GPIO3
    id: led_wifi
  - platform: gpio
    pin: GPIO4
    id: led_gea

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: return id(gea_hub).is_bus_connected();
          then:
            - output.turn_on: led_gea
          else:
            - output.turn_off: led_gea

# ---------------------------------------------------------------------------
# UART — GEA2 19200 baud
# ---------------------------------------------------------------------------
uart:
  id: uart_gea
  tx_pin: GPIO9
  rx_pin: GPIO10
  baud_rate: 19200

# ---------------------------------------------------------------------------
# GEA2 hub
# ---------------------------------------------------------------------------
gea:
  id: gea_hub
  uart_id: uart_gea
  protocol: gea2
  dest_address: 0xF0
  erd_lookup: true

# ---------------------------------------------------------------------------
# Numbers (read-write numeric ERDs)
# ---------------------------------------------------------------------------

number:
  - platform: gea
    gea_id: gea_hub
    name: Refrigerator Setpoint
    erd: 0x1005
    byte_offset: 0
    decode: int8
    min_value: 34
    max_value: 44
    step: 1
    unit_of_measurement: "°F"

  - platform: gea
    gea_id: gea_hub
    name: Freezer Setpoint
    erd: 0x1005
    byte_offset: 1
    decode: int8
    min_value: -6
    max_value: 6
    step: 1
    unit_of_measurement: "°F"

# No Electric Deli Pan Option on this model uses plastic vent sliders
#  - platform: gea
#    gea_id: gea_hub
#    name: Deli Pan Position 1 Temperature
#    erd: 0x1013
#    byte_offset: 0
#    decode: uint8
#    min_value: 30
#    max_value: 98
#    step: 1
#    unit_of_measurement: "°F"

  - platform: gea
    gea_id: gea_hub
    name: Nighttime Snack Timeout
    erd: 0x101F
    decode: uint16_be
    min_value: 0
    max_value: 1440
    step: 1
    unit_of_measurement: min

# ---------------------------------------------------------------------------
# Sensors (numeric read-only)
# ---------------------------------------------------------------------------
sensor:

  - platform: gea
    gea_id: gea_hub
    name: Refrigerator Minimum Setpoint
    erd: 0x100B
    byte_offset: 0
    decode: int8
    unit_of_measurement: "°F"
    icon: mdi:thermometer-low

  - platform: gea
    gea_id: gea_hub
    name: Refrigerator Maximum Setpoint
    erd: 0x100B
    byte_offset: 1
    decode: int8
    unit_of_measurement: "°F"
    icon: mdi:thermometer-high

  - platform: gea
    gea_id: gea_hub
    name: Freezer Minimum Setpoint
    erd: 0x100B
    byte_offset: 2
    decode: int8
    unit_of_measurement: "°F"
    icon: mdi:snowflake-thermometer

  - platform: gea
    gea_id: gea_hub
    name: Freezer Maximum Setpoint
    erd: 0x100B
    byte_offset: 3
    decode: int8
    unit_of_measurement: "°F"
    icon: mdi:snowflake-thermometer

  - platform: gea
    gea_id: gea_hub
    name: Refrigerator Temperature
    erd: 0x1004
    byte_offset: 0
    decode: int8
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement

  - platform: gea
    gea_id: gea_hub
    name: Freezer Temperature
    erd: 0x1004
    byte_offset: 1
    decode: int8
    unit_of_measurement: "°F"
    device_class: temperature
    state_class: measurement

  - platform: gea
    gea_id: gea_hub
    name: Water Filter Life
    erd: 0x1009
    byte_offset: 2
    decode: uint8
    unit_of_measurement: "%"
    icon: mdi:water-percent

  - platform: gea
    gea_id: gea_hub
    name: Water Filter Days Remaining
    erd: 0x1009
    byte_offset: 3
    decode: uint16_be
    unit_of_measurement: d
    icon: mdi:calendar

  - platform: gea
    gea_id: gea_hub
    name: Water Filter Days Since Expired
    erd: 0x1009
    byte_offset: 5
    decode: uint16_be
    unit_of_measurement: d
    icon: mdi:calendar-alert

  - platform: gea
    gea_id: gea_hub
    name: Water Filter Dispenses Since Expired
    erd: 0x1009
    byte_offset: 7
    decode: uint16_be
    accuracy_decimals: 0
    state_class: total_increasing
    entity_category: diagnostic
    icon: mdi:cup-water

  - platform: gea
    gea_id: gea_hub
    name: Crushed Ice Dispenses
    erd: 0x1102
    byte_offset: 0
    decode: uint16_be
    accuracy_decimals: 0
