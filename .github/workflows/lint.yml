name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          mapfile -t files < <(find components/gea -type f \( -name '*.h' -o -name '*.cpp' \))
          clang-format --dry-run --Werror "${files[@]}"
