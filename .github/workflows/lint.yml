name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Runs every hook in .pre-commit-config.yaml against all files. The
      # clang-format version is pinned there, so this check is reproducible and
      # matches what `pre-commit` runs locally — no apt version drift.
      - uses: pre-commit/action@v3.0.1
