name: Compile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile:
    name: ${{ matrix.config }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - devices/dishwasher/PDP715SYV0FS.yaml
          - devices/washer/PFQ97HSPVDS.yaml

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache ESPHome build
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.esphome
            .esphome
          key: esphome-${{ matrix.config }}-${{ hashFiles(matrix.config, 'components/**') }}
          restore-keys: |
            esphome-${{ matrix.config }}-

      - name: Install ESPHome
        run: pip install esphome

      - name: Create dummy secrets
        run: |
          cat > $(dirname ${{ matrix.config }})/secrets.yaml << 'EOF'
          wifi_ssid: "ci-network"
          wifi_password: "ci-password"
          api_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          ota_password: "ci-password"
          ap_password: "ci-password"
          EOF

      - name: Compile ${{ matrix.config }}
        run: esphome compile ${{ matrix.config }}

  compile-done:
    needs: [compile]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          result="${{ needs.compile.result }}"
          if [[ "$result" == "success" ]]; then exit 0; else exit 1; fi
