name: Compile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile:
    name: ${{ matrix.config }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - dishwasher.yaml
          - washer.yaml

    steps:
      - uses: actions/checkout@v4

      - name: Cache ESPHome build
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.esphome
            .esphome
          key: esphome-${{ matrix.config }}-${{ hashFiles(matrix.config, 'components/**') }}
          restore-keys: |
            esphome-${{ matrix.config }}-

      - name: Install ESPHome
        run: pip install esphome

      - name: Create dummy secrets
        run: |
          cat > secrets.yaml << 'EOF'
          wifi_ssid: "ci"
          wifi_password: "ci"
          api_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          ota_password: "ci"
          ap_password: "ci"
          EOF

      - name: Compile ${{ matrix.config }}
        run: esphome compile ${{ matrix.config }}
