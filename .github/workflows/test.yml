name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  host-test:
    name: host unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run
        run: |
          g++ -std=c++17 -Wall -Wextra -Werror -o /tmp/test_string_decode tests/host/test_string_decode.cpp
          /tmp/test_string_decode

  compile-test:
    name: ${{ matrix.config }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - tests/components/gea/test.esp32-idf.yaml
          - tests/components/gea/test.esp32-arduino.yaml
          - tests/components/gea/test.esp8266.yaml
          - tests/components/gea/test.rp2040.yaml
          - tests/components/gea/test.esp32-idf.gea2.yaml
          - tests/components/gea/test.esp32-idf.gea2-scan.yaml
          - tests/components/gea/test.esp32-idf.erd-lookup.yaml

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache ESPHome build
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.esphome
            .esphome
          key: esphome-${{ matrix.config }}-${{ hashFiles(matrix.config, 'tests/components/gea/common.yaml', 'tests/components/gea/common.gea2.yaml', 'components/**') }}
          restore-keys: |
            esphome-${{ matrix.config }}-

      - name: Install ESPHome
        run: pip install esphome

      - name: Compile ${{ matrix.config }}
        run: esphome compile ${{ matrix.config }}

  compile-test-done:
    needs: [compile-test, host-test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          compile="${{ needs.compile-test.result }}"
          host="${{ needs.host-test.result }}"
          if [[ "$compile" == "success" && "$host" == "success" ]]; then exit 0; else exit 1; fi
