name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile-test:
    name: Compile tests/test.yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache ESPHome build
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.esphome
            .esphome
          key: esphome-test-${{ hashFiles('tests/test.yaml', 'components/**') }}
          restore-keys: |
            esphome-test-

      - name: Install ESPHome
        run: pip install esphome

      - name: Compile tests/test.yaml
        run: esphome compile tests/test.yaml
