# ---------------------------------------------------------------------------
# Binary sensors
# ---------------------------------------------------------------------------
binary_sensor:
  # Door — 0x00 = open, 0x01 = closed (inverted logic)
  - platform: gea
    gea_id: gea_hub
    name: "Porte"
    erd: 0x2012
    device_class: opening
    inverted: true

  # Pump running
  - platform: gea
    gea_id: gea_hub
    name: "Pompe"
    erd: 0x2026
    device_class: running
    icon: mdi:pump
    entity_category: diagnostic

  # Remote start enabled
  - platform: gea
    gea_id: gea_hub
    name: "Démarrage à distance"
    erd: 0x214A
    icon: mdi:remote

  # Lint filter — 0x00 = needs attention, 0x01 = OK (inverted)
  - platform: gea
    gea_id: gea_hub
    name: "Filtre"
    erd: 0x215F
    device_class: problem
    icon: mdi:air-filter
    entity_category: diagnostic
    inverted: true

  # Door lock — 0x00 = locked, 0x01 = unlocked (inverted)
  - platform: gea
    gea_id: gea_hub
    name: "Verrou"
    erd: 0x2013
    device_class: lock
    inverted: true

# ---------------------------------------------------------------------------
# Switches (read-write binary ERDs)
# ---------------------------------------------------------------------------
switch:
  # Extra dry
  - platform: gea
    gea_id: gea_hub
    name: "Séchage supplémentaire"
    erd: 0x213A
    write_erd: 0x213B
    icon: mdi:tumble-dryer

  # Pre-wash
  - platform: gea
    gea_id: gea_hub
    name: "Prélavage"
    erd: 0x205B
    write_erd: 0x205A
    icon: mdi:liquid-spot

  # Extra rinse
  - platform: gea
    gea_id: gea_hub
    name: "Rinçage supplémentaire"
    erd: 0x20B3
    write_erd: 0x20B4
    icon: mdi:water-plus

  # Wash complete notification
  - platform: gea
    gea_id: gea_hub
    name: "Notification lavage complété"
    erd: 0x2155
    write_erd: 0x2156
    icon: mdi:bell

  # Anti-wrinkle
  - platform: gea
    gea_id: gea_hub
    name: "Antifroissement"
    erd: 0x2053
    write_erd: 0x2051
    icon: mdi:iron

  # Extra water (MaxFill) — on=0x02, off=0x00
  - platform: gea
    gea_id: gea_hub
    name: "Plus d'eau"
    erd: 0x20AD
    write_erd: 0x20AE
    payload_on: 0x02
    payload_off: 0x00
    icon: mdi:waves-arrow-up

# ---------------------------------------------------------------------------
# Selects (read-write enum ERDs)
# ---------------------------------------------------------------------------
select:
  # Detergent dosing — 3-byte payload, read 0x20C2, write 0x20C1
  # Values: 000100=Off, 000101=Moins, 000102=Plus, 000103=Auto
  - platform: gea
    gea_id: gea_hub
    name: "Dosage détergent"
    erd: 0x20C2
    write_erd: 0x20C1
    decode: uint32_be
    data_size: 3
    icon: mdi:chart-bubble
    options:
      0x000103: "Auto"
      0x000102: "Plus"
      0x000101: "Moins"
      0x000100: "Éteint"

  # Softener dosing — 3-byte payload, read 0x2144, write 0x2143
  # Values: 010100=Off, 010101=Moins, 010102=Plus, 010103=Auto
  - platform: gea
    gea_id: gea_hub
    name: "Dosage assouplissant"
    erd: 0x2144
    write_erd: 0x2143
    decode: uint32_be
    data_size: 3
    icon: mdi:feather
    options:
      0x010103: "Auto"
      0x010102: "Plus"
      0x010101: "Moins"
      0x010100: "Éteint"

  # Spin speed — read 0x2139, write 0x212A
  - platform: gea
    gea_id: gea_hub
    name: "Vitesse d'essorage"
    erd: 0x2139
    write_erd: 0x212A
    decode: uint8
    icon: mdi:sync-circle
    options:
      0x00: "Aucun essorage"
      0x01: "Bas"
      0x02: "Moyen"
      0x03: "Élevé"
      0x04: "Très élevé"

  # Soil level — read 0x20BE, write 0x20BF
  - platform: gea
    gea_id: gea_hub
    name: "Niveau de saleté"
    erd: 0x20BE
    write_erd: 0x20BF
    decode: uint8
    icon: mdi:liquid-spot
    options:
      0x01: "Extra léger"
      0x02: "Léger"
      0x03: "Normal"
      0x04: "Sale"
      0x05: "Très sale"

  # Temperature — read 0x20BB, write 0x20BC
  - platform: gea
    gea_id: gea_hub
    name: "Température"
    erd: 0x20BB
    write_erd: 0x20BC
    decode: uint8
    icon: mdi:thermometer-water
    options:
      0x01: "Robinet froid"
      0x02: "Froid"
      0x05: "Tiède"
      0x06: "Chaud"
      0x07: "Très chaud"

  # Additional programs — read 0x20D3, write 0x20D1
  - platform: gea
    gea_id: gea_hub
    name: "Programmes additionnels"
    erd: 0x20D3
    write_erd: 0x20D1
    decode: uint8
    icon: mdi:plus-network
    options:
      0x11: "Nettoyage en profondeur"
      0x0B: "Jeans"
      0x36: "Maillots de bain"
      0x85: "Sans chaleur"

# ---------------------------------------------------------------------------
# Buttons (fire-and-forget actions)
# ---------------------------------------------------------------------------
button:
  # Remote start
  - platform: gea
    gea_id: gea_hub
    name: "Démarrer à distance"
    erd: 0x2149
    payload: [0x00]
    icon: mdi:play-network

  # Remote stop
  - platform: gea
    gea_id: gea_hub
    name: "Arrêter à distance"
    erd: 0x2040
    payload: [0x00]
    icon: mdi:close-network
