# ESPHome config for a GE Ultrafast Combo washer/dryer via GEA3 protocol
# Appliance: GE PFQ97HSPVDS (Ultrafast Combo)
# Hardware: Seeed XIAO ESP32-C3 on the FirstBuild carrier board (RJ45 breakout)
# Framework: ESP-IDF
# Baud rate: 230400 (GEA3)
# TX = GPIO21 (D6), RX = GPIO20 (D7)

esphome:
  name: ge-ultrafast-combo
  friendly_name: GE Ultrafast Combo
  project:
    name: GE.PFQ97HSPVDS
    version: "1.0.0"

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: components
    components: [gea]

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key
  on_client_connected:
    - lambda: id(gea_hub).log_erds();

ota:
  - platform: esphome
    password: !secret ota_password

web_server:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ge-ultrafast fallback"
    password: !secret ap_password
  on_connect:
    - output.turn_on: led_wifi
  on_disconnect:
    - output.turn_off: led_wifi

# ---------------------------------------------------------------------------
# Status LEDs
# ---------------------------------------------------------------------------
status_led:
  pin: GPIO2

output:
  - platform: gpio
    pin: GPIO3
    id: led_wifi
  - platform: gpio
    pin: GPIO4
    id: led_gea

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: return id(gea_hub).is_bus_connected();
          then:
            - output.turn_on: led_gea
          else:
            - output.turn_off: led_gea

# ---------------------------------------------------------------------------
# UART — GEA3 full-duplex, 230400 baud
# ---------------------------------------------------------------------------
uart:
  id: uart_gea
  tx_pin: GPIO21
  rx_pin: GPIO20
  baud_rate: 230400
  data_bits: 8
  stop_bits: 1
  parity: NONE
  rx_buffer_size: 512

# ---------------------------------------------------------------------------
# GEA3 hub
# ---------------------------------------------------------------------------
gea:
  id: gea_hub
  uart_id: uart_gea
  src_address: 0xE4

# ---------------------------------------------------------------------------
# Sensors (read-only)
# ---------------------------------------------------------------------------
sensor:
  # Time remaining for the full program (seconds → minutes via filter)
  - platform: gea
    gea_id: gea_hub
    name: "Temps restant du programme"
    erd: 0x2007
    decode: uint16_be
    device_class: duration
    unit_of_measurement: min
    accuracy_decimals: 1
    icon: mdi:timer
    filters:
      - lambda: return x / 60.0;  # seconds → minutes

  # Wash time remaining (seconds → minutes)
  - platform: gea
    gea_id: gea_hub
    name: "Temps restant lavage"
    erd: 0x2122
    decode: uint16_be
    device_class: duration
    unit_of_measurement: min
    accuracy_decimals: 1
    icon: mdi:timer
    filters:
      - lambda: return x / 60.0;  # seconds → minutes

  # Dry time remaining (seconds → minutes)
  - platform: gea
    gea_id: gea_hub
    name: "Temps restant séchage"
    erd: 0x2123
    decode: uint16_be
    device_class: duration
    unit_of_measurement: min
    accuracy_decimals: 1
    icon: mdi:timer
    filters:
      - lambda: return x / 60.0;  # seconds → minutes

  # Delayed start (minutes)
  - platform: gea
    gea_id: gea_hub
    name: "Départ différé"
    erd: 0x2010
    decode: uint16_be
    device_class: duration
    unit_of_measurement: min
    accuracy_decimals: 0
    icon: mdi:clock-start

  # Drum speed (RPM)
  - platform: gea
    gea_id: gea_hub
    name: "Vitesse tambour"
    erd: 0x202C
    decode: uint16_be
    unit_of_measurement: rpm
    accuracy_decimals: 0
    icon: mdi:sync-circle
    entity_category: diagnostic

  # Water temperature (Fahrenheit × 10 → Celsius via filter)
  - platform: gea
    gea_id: gea_hub
    name: "Température de l'eau"
    erd: 0x2043
    decode: uint16_be
    device_class: temperature
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    entity_category: diagnostic
    filters:
      - lambda: return (x / 10.0 - 32.0) * 5.0 / 9.0;

  # Pressure (raw → Pa via filter)
  - platform: gea
    gea_id: gea_hub
    name: "Pression"
    erd: 0x2042
    decode: uint16_be
    device_class: pressure
    unit_of_measurement: Pa
    accuracy_decimals: 2
    icon: mdi:gauge
    entity_category: diagnostic
    filters:
      - lambda: return x / 1000.0 * 248.84;

