# ESPHome config for a GE dishwasher via GEA3 protocol
# Hardware: Seeed XIAO ESP32-C3 on the FirstBuild carrier board (RJ45 breakout)
# Framework: Arduino (same as original geappliances/home-assistant-adapter firmware)
# Baud rate: 230400 (GEA3) — 19200 is GEA2 only
# TX = GPIO21 (D6), RX = GPIO20 (D7) — confirmed from carrier board schematic (J103/J105 pin 7)

esphome:
  name: ge-dishwasher
  friendly_name: GE Dishwasher

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: arduino

external_components:
  - source:
      type: local
      path: components
    components: [gea]

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ge-dishwasher fallback"
    password: !secret ap_password
  on_connect:
    - output.turn_on: led_wifi
  on_disconnect:
    - output.turn_off: led_wifi

# ---------------------------------------------------------------------------
# Status LEDs — matches the original GE home-assistant-adapter carrier board
#   D0 (GPIO2): system heartbeat  — blinks while connecting, solid when fully OK
#   D1 (GPIO3): Wi-Fi connected   — solid on
#   D2 (GPIO4): GEA bus connected — solid when appliance is responding
# ---------------------------------------------------------------------------
status_led:
  pin: GPIO2   # D0 — handled entirely by ESPHome (fast blink=error, slow=degraded, off=OK)

output:
  - platform: gpio
    pin: GPIO3
    id: led_wifi
  - platform: gpio
    pin: GPIO4
    id: led_gea

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: return id(gea_hub).is_bus_connected();
          then:
            - output.turn_on: led_gea
          else:
            - output.turn_off: led_gea

# ---------------------------------------------------------------------------
# UART — GEA3 full-duplex, 230400 baud
# ---------------------------------------------------------------------------
uart:
  id: uart_gea
  tx_pin: GPIO21   # D6 (confirmed from carrier board schematic: J103 pin 7 → M_GEA3_TX)
  rx_pin: GPIO20   # D7 (confirmed from carrier board schematic: J105 pin 7 → M_GEA3_RX)
  baud_rate: 230400
  data_bits: 8
  stop_bits: 1
  parity: NONE
  rx_buffer_size: 512

# ---------------------------------------------------------------------------
# GEA3 hub
# ---------------------------------------------------------------------------
gea:
  id: gea_hub
  uart_id: uart_gea
  # dest_address omitted — auto-detected from the first valid packet on the bus.
  # Set explicitly (e.g. dest_address: 0x24) to skip auto-detect.
  src_address: 0xE4  # matches geappliances/home-assistant-adapter default
  resubscribe_interval: 60s  # re-send subscribe_all if appliance power-cycles

# ---------------------------------------------------------------------------
# Sensors — ERDs discovered from PDP715SYV0FS dishwasher
# ---------------------------------------------------------------------------
sensor:
  # Elapsed time counter (seconds, increments at 1 Hz while running)
  - platform: gea
    gea_id: gea_hub
    name: "Elapsed Time"
    erd: 0x0702
    unit_of_measurement: s
    accuracy_decimals: 0
    decode: uint32_be
    icon: mdi:timer-outline

  # Machine state (e.g. 0x02 = idle)
  - platform: gea
    gea_id: gea_hub
    name: "Machine State"
    erd: 0x3001
    accuracy_decimals: 0
    decode: uint8

  # Cycle index: 0=AutoSense, 1=Heavy, 2=Normal, 3=1Hr Wash, 4=Rinse
  - platform: gea
    gea_id: gea_hub
    name: "Cycle Index"
    erd: 0x321B
    accuracy_decimals: 0
    decode: uint8

  # Per-cycle value (varies per cycle selection)
  - platform: gea
    gea_id: gea_hub
    name: "Cycle Parameter"
    erd: 0xD004
    accuracy_decimals: 0
    decode: uint16_be

  # Unknown 2-byte value (0x0009 / 0x000A observed)
  - platform: gea
    gea_id: gea_hub
    name: "ERD 0x3084"
    erd: 0x3084
    accuracy_decimals: 0
    decode: uint16_be

  # Unknown 2-byte value (0x0000 / 0x0008 / 0x0009 observed)
  - platform: gea
    gea_id: gea_hub
    name: "ERD 0x3107"
    erd: 0x3107
    accuracy_decimals: 0
    decode: uint16_be

# ---------------------------------------------------------------------------
# Text sensors
# ---------------------------------------------------------------------------
text_sensor:
  # Cycle name as ASCII text (e.g. "AutoSense", "Heavy", "Normal")
  - platform: gea
    gea_id: gea_hub
    name: "Cycle Name"
    erd: 0x301C
    decode: ascii
    icon: mdi:dishwasher

  # Appliance model number (ASCII)
  - platform: gea
    gea_id: gea_hub
    name: "Model Number"
    erd: 0x0001
    decode: ascii

  # Cycle status — 6 bytes, raw hex for inspection
  - platform: gea
    gea_id: gea_hub
    name: "Cycle Status Raw"
    erd: 0x3000

  # Cycle config — 3 bytes, raw hex for inspection
  - platform: gea
    gea_id: gea_hub
    name: "Cycle Config Raw"
    erd: 0x3007

  # 8-byte ERD with toggling value
  - platform: gea
    gea_id: gea_hub
    name: "ERD 0x3230 Raw"
    erd: 0x3230

  # Unknown 4-byte ERD
  - platform: gea
    gea_id: gea_hub
    name: "ERD 0x322A Raw"
    erd: 0x322A

  # Unknown 6-byte ERDs
  - platform: gea
    gea_id: gea_hub
    name: "ERD 0x3227 Raw"
    erd: 0x3227

  - platform: gea
    gea_id: gea_hub
    name: "ERD 0x3228 Raw"
    erd: 0x3228

  - platform: gea
    gea_id: gea_hub
    name: "ERD 0x3229 Raw"
    erd: 0x3229
