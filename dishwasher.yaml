# ESPHome config for a GE dishwasher via GEA3 protocol
# Hardware: Seeed XIAO ESP32-C3 on the FirstBuild carrier board (RJ45 breakout)
# Framework: Arduino (same as original geappliances/home-assistant-adapter firmware)
# Baud rate: 230400 (GEA3) — 19200 is GEA2 only
# TX = GPIO21 (D6), RX = GPIO20 (D7) — confirmed from carrier board schematic (J103/J105 pin 7)

esphome:
  name: ge-dishwasher
  friendly_name: GE Dishwasher
  # These populate the HA device info panel (Manufacturer / Model / Version).
  # project.name → shown as "Model" in HA; project.version → "SW Version".
  project:
    name: GE.PDP715SYV0FS
    version: "1.0.0"

esp32:
  board: seeed_xiao_esp32c3
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: components
    components: [gea]

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key
  on_client_connected:
    - lambda: id(gea_hub).log_erds();

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ge-dishwasher fallback"
    password: !secret ap_password
  on_connect:
    - output.turn_on: led_wifi
  on_disconnect:
    - output.turn_off: led_wifi

# ---------------------------------------------------------------------------
# Status LEDs — matches the original GE home-assistant-adapter carrier board
#   D0 (GPIO2): system heartbeat  — blinks while connecting, solid when fully OK
#   D1 (GPIO3): Wi-Fi connected   — solid on
#   D2 (GPIO4): GEA bus connected — solid when appliance is responding
# ---------------------------------------------------------------------------
status_led:
  pin: GPIO2   # D0 — handled entirely by ESPHome (fast blink=error, slow=degraded, off=OK)

output:
  - platform: gpio
    pin: GPIO3
    id: led_wifi
  - platform: gpio
    pin: GPIO4
    id: led_gea

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: return id(gea_hub).is_bus_connected();
          then:
            - output.turn_on: led_gea
          else:
            - output.turn_off: led_gea

# ---------------------------------------------------------------------------
# UART — GEA3 full-duplex, 230400 baud
# ---------------------------------------------------------------------------
uart:
  id: uart_gea
  tx_pin: GPIO21   # D6 (confirmed from carrier board schematic: J103 pin 7 → M_GEA3_TX)
  rx_pin: GPIO20   # D7 (confirmed from carrier board schematic: J105 pin 7 → M_GEA3_RX)
  baud_rate: 230400
  data_bits: 8
  stop_bits: 1
  parity: NONE
  rx_buffer_size: 512

# ---------------------------------------------------------------------------
# GEA3 hub
# ---------------------------------------------------------------------------
gea:
  id: gea_hub
  uart_id: uart_gea
  # dest_address omitted — auto-detected from the first valid packet on the bus.
  # Set explicitly (e.g. dest_address: 0x24) to skip auto-detect.
  src_address: 0xE4  # matches geappliances/home-assistant-adapter default

# ---------------------------------------------------------------------------
# Sensors (read-only) — ERDs discovered from PDP715SYV0FS dishwasher
# ---------------------------------------------------------------------------
sensor:
  # Elapsed time counter — total_increasing so HA tracks it correctly in history
  - platform: gea
    gea_id: gea_hub
    name: "Elapsed Time"
    erd: 0x0702
    unit_of_measurement: s
    accuracy_decimals: 0
    decode: uint32_be
    icon: mdi:timer-outline
    state_class: total_increasing

  # Machine state (e.g. 0x02 = idle) — diagnostic, not shown on main dashboard
  - platform: gea
    gea_id: gea_hub
    name: "Machine State"
    erd: 0x3001
    accuracy_decimals: 0
    decode: uint8
    entity_category: diagnostic

  # Per-cycle value (varies per cycle selection) — diagnostic
  - platform: gea
    gea_id: gea_hub
    name: "Cycle Parameter"
    erd: 0xD004
    accuracy_decimals: 0
    decode: uint16_be
    entity_category: diagnostic

  # Unknown 2-byte value (0x0009 / 0x000A observed) — diagnostic
  - platform: gea
    gea_id: gea_hub
    name: "ERD 0x3084"
    erd: 0x3084
    accuracy_decimals: 0
    decode: uint16_be
    entity_category: diagnostic

  # Unknown 2-byte value (0x0000 / 0x0008 / 0x0009 observed) — diagnostic
  - platform: gea
    gea_id: gea_hub
    name: "ERD 0x3107"
    erd: 0x3107
    accuracy_decimals: 0
    decode: uint16_be
    entity_category: diagnostic

# ---------------------------------------------------------------------------
# Number (read-write numeric ERDs — updates from bus AND writable from HA)
# ---------------------------------------------------------------------------
number:
  # Cycle parameter — writable numeric value
  - platform: gea
    gea_id: gea_hub
    name: "Cycle Parameter Control"
    erd: 0xD004
    decode: uint16_be
    min_value: 0
    max_value: 65535
    step: 1
    entity_category: diagnostic

# ---------------------------------------------------------------------------
# Switch (read-write binary ERDs — updates from bus AND toggleable from HA)
# ---------------------------------------------------------------------------
switch:
  # ERD 0x3230 — toggles 0/1 on the bus; reflects appliance state in HA
  - platform: gea
    gea_id: gea_hub
    name: "ERD 0x3230 Switch"
    erd: 0x3230
    entity_category: diagnostic

# ---------------------------------------------------------------------------
# Select (read-write enum ERDs — updates from bus AND selectable from HA)
# ---------------------------------------------------------------------------
select:
  # Wash cycle selection — reads cycle index from bus, writes new cycle to appliance
  - platform: gea
    gea_id: gea_hub
    name: "Wash Cycle"
    erd: 0x321B
    decode: uint8
    icon: mdi:dishwasher
    options:
      0x00: "AutoSense"
      0x01: "Heavy"
      0x02: "Normal"
      0x03: "1 Hr Wash"
      0x04: "Rinse"

# ---------------------------------------------------------------------------
# Button (fire-and-forget ERD writes — press triggers a write to the bus)
# ---------------------------------------------------------------------------
button:
  # Read ERD 0x0001 (model number) — test that write_erd round-trips work
  # internal: true → visible in ESPHome web UI only, not exposed to HA
  - platform: gea
    gea_id: gea_hub
    name: "Request Model Number"
    erd: 0x0001
    payload: [0x00]
    icon: mdi:information-outline
    internal: true

# ---------------------------------------------------------------------------
# Text sensors (read-only)
# ---------------------------------------------------------------------------
text_sensor:
  # Cycle name as ASCII text (e.g. "AutoSense", "Heavy", "Normal")
  - platform: gea
    gea_id: gea_hub
    name: "Cycle Name"
    erd: 0x301C
    decode: ascii
    icon: mdi:dishwasher

  # Appliance model number — diagnostic, static info
  - platform: gea
    gea_id: gea_hub
    name: "Model Number"
    erd: 0x0001
    decode: ascii
    entity_category: diagnostic

  # Cycle status — diagnostic raw hex for inspection
  - platform: gea
    gea_id: gea_hub
    name: "Cycle Status Raw"
    erd: 0x3000
    entity_category: diagnostic

  # Cycle config — diagnostic raw hex for inspection
  - platform: gea
    gea_id: gea_hub
    name: "Cycle Config Raw"
    erd: 0x3007
    entity_category: diagnostic

  # Unknown ERDs — all diagnostic until identified
  - platform: gea
    gea_id: gea_hub
    name: "ERD 0x322A Raw"
    erd: 0x322A
    entity_category: diagnostic

  - platform: gea
    gea_id: gea_hub
    name: "ERD 0x3227 Raw"
    erd: 0x3227
    entity_category: diagnostic

  - platform: gea
    gea_id: gea_hub
    name: "ERD 0x3228 Raw"
    erd: 0x3228
    entity_category: diagnostic

  - platform: gea
    gea_id: gea_hub
    name: "ERD 0x3229 Raw"
    erd: 0x3229
    entity_category: diagnostic
