external_components:
  - source:
      type: local
      path: ../../../components
    components: [gea]

# Disable logger UART so no platform conflicts with the GEA UART pin choice
# in the compile tests. (Production configs leave this at default.)
logger:
  baud_rate: 0

# ---------------------------------------------------------------------------
# Hub — GEA2 with ERD discovery enabled. Compiles the GEA_GEA2_DISCOVERY path,
# including the bus-liveness gate that holds the scan until the bus responds.
# ---------------------------------------------------------------------------
gea:
  id: gea_hub
  uart_id: uart_gea
  protocol: gea2
  src_address: 0xBB
  dest_address: 0xC0
  gea2_discovery: true

sensor:
  - platform: gea
    gea_id: gea_hub
    name: "u8"
    erd: 0x0001
    decode: uint8
