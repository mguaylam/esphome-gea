# Compile test — ESP32 with Arduino framework.
# Run: esphome compile tests/components/gea/test.esp32-arduino.yaml

esphome:
  name: gea-test

esp32:
  board: esp32dev
  framework:
    type: arduino

uart:
  id: uart_gea
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 230400

packages:
  common: !include common.yaml
